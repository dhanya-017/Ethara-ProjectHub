services:
  # Frontend Service
  - type: web
    name: ethara-frontend
    env: node
    buildCommand: npm install && npm run build
    startCommand: npm start
    healthCheckPath: /
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5173

  # Backend Service
  - type: web
    name: ethara-backend
    env: node
    buildCommand: cd backend && npm install
    startCommand: cd backend && npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5001
      - key: MONGODB_URI
        sync: false  # You'll need to set this in Render dashboard
      - key: JWT_SECRET
        sync: false  # You'll need to set this in Render dashboard
